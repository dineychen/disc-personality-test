<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>🥏 飞盘人格测试</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      color: #fff;
      overflow-x: hidden;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
      min-height: 100vh;
    }

    /* 开场页 */
    .page {
      display: none;
      animation: fadeIn 0.5s ease;
    }

    .page.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .landing {
      text-align: center;
      padding-top: 60px;
    }

    .landing h1 {
      font-size: 2.2em;
      margin-bottom: 10px;
      text-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
    }

    .landing .subtitle {
      font-size: 1.1em;
      color: #aaa;
      margin-bottom: 30px;
    }

    .landing .disc-fly {
      font-size: 4em;
      margin: 30px 0;
      animation: bounce 2s infinite;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-20px); }
    }

    .landing .desc {
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      margin: 20px 0;
      text-align: left;
      font-size: 0.95em;
      line-height: 1.8;
      color: #ddd;
    }

    .landing .warning {
      font-size: 0.85em;
      color: #888;
      margin: 20px 0;
    }

    .btn {
      background: linear-gradient(135deg, #ff6b6b, #ff8e53);
      border: none;
      color: white;
      padding: 16px 40px;
      font-size: 1.1em;
      border-radius: 50px;
      cursor: pointer;
      margin-top: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 20px rgba(255, 107, 107, 0.4);
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 6px 30px rgba(255, 107, 107, 0.6);
    }

    .btn:active {
      transform: scale(0.98);
    }

    /* 测试页 */
    .test-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .progress-text {
      font-size: 0.9em;
      color: #aaa;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
      margin-bottom: 30px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #ff6b6b, #ff8e53);
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .question-text {
      font-size: 1.2em;
      margin-bottom: 25px;
      line-height: 1.6;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .option {
      background: rgba(255,255,255,0.08);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 14px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s ease;
      font-size: 0.95em;
      line-height: 1.5;
    }

    .option:hover {
      background: rgba(255,255,255,0.15);
      border-color: rgba(255, 107, 107, 0.5);
      transform: translateX(5px);
    }

    .option.selected {
      background: rgba(255, 107, 107, 0.3);
      border-color: #ff6b6b;
    }

    .option .label {
      color: #ff6b6b;
      font-weight: bold;
      margin-right: 8px;
    }

    /* 结果页 */
    .result {
      text-align: center;
      padding-top: 30px;
    }

    .result-header {
      font-size: 1.2em;
      color: #aaa;
      margin-bottom: 20px;
    }

    .result-type {
      font-size: 3em;
      margin: 20px 0;
      text-shadow: 0 0 30px rgba(255, 107, 107, 0.6);
    }

    .result-name {
      font-size: 2em;
      margin-bottom: 10px;
    }

    .result-quote {
      font-size: 1.1em;
      color: #ff6b6b;
      font-style: italic;
      margin: 20px 0;
      padding: 15px;
      background: rgba(255, 107, 107, 0.1);
      border-radius: 12px;
    }

    .result-traits {
      background: rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 20px;
      margin: 25px 0;
      text-align: left;
      line-height: 1.8;
    }

    .result-traits h3 {
      color: #ff6b6b;
      margin-bottom: 10px;
      font-size: 1.1em;
    }

    .result-match {
      font-size: 1.5em;
      margin: 20px 0;
    }

    .result-match span {
      color: #ff6b6b;
      font-weight: bold;
    }

    .share-tip {
      font-size: 0.85em;
      color: #888;
      margin: 20px 0;
    }

    .dimensions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin: 20px 0;
    }

    .dimension {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      padding: 12px;
      text-align: center;
    }

    .dimension .name {
      font-size: 0.8em;
      color: #888;
    }

    .dimension .value {
      font-size: 1.2em;
      color: #ff6b6b;
      font-weight: bold;
    }

    .actions {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin-top: 30px;
    }

    .btn-secondary {
      background: rgba(255,255,255,0.1);
      border: 2px solid rgba(255,255,255,0.3);
      color: white;
      padding: 14px 25px;
      font-size: 1em;
      border-radius: 50px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: rgba(255,255,255,0.2);
    }

    /* 趣味弹幕 */
    .fun-text {
      font-size: 0.9em;
      color: #888;
      margin-top: 40px;
      font-style: italic;
    }

    /* 页面切换动画 */
    .page-transition {
      animation: slideIn 0.4s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(30px); }
      to { opacity: 1; transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- 开场页 -->
    <div id="landing" class="page landing active">
      <h1>🥏 飞盘人格测试</h1>
      <div class="subtitle">DISC-FLY · 你是哪种飞盘选手？</div>
      <div class="disc-fly">🥏</div>
      <div class="desc">

        或者是场边指挥全场的<strong>李云龙</strong>？<br><br>
        做完17道题，揭晓你的飞盘人格！
      </div>
      <button class="btn" onclick="startTest()">开始测试 →</button>

        ⚠️ 本测试纯属娱乐，请勿当真<br>

    </div>

    <!-- 测试页 -->
    <div id="test" class="page">
      <div class="test-header">
        <div class="progress-text">第 <span id="currentQ">1</span> / <span id="totalQ">17</span> 题</div>
        <div class="progress-text" id="timer"></div>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
      <div class="question-text" id="questionText"></div>
      <div class="options" id="optionsContainer"></div>
    </div>

    <!-- 结果页 -->
    <div id="result" class="page result">
      <div class="result-header">你的飞盘人格是</div>
      <div class="result-type" id="resultType"></div>
      <div class="result-name" id="resultName"></div>
      <div class="result-quote" id="resultQuote"></div>
      <div class="dimensions" id="dimensions"></div>
      <div class="result-traits" id="resultTraits">
        <h3>📋 特征描述</h3>
        <p id="traitsText"></p>
      </div>
      <div class="result-match">与你的人格匹配度：<span id="matchPercent">0</span>%</div>
      <div class="share-tip">👆 长按保存结果图分享到朋友圈</div>
      <div class="actions">
        <button class="btn-secondary" onclick="shareResult()">📤 分享给朋友</button>
        <button class="btn-secondary" onclick="restartTest()">🔄 重新测试</button>
      </div>
      <div class="fun-text" id="funText"></div>
    </div>
  </div>

        name: "二营长",
        quote: "\"接到盘别废话，huck就完事了！\"",
        traits: "接到盘不超过3秒必出盘。什么战术什么跑位，不存在的，huck就是最好的战术。宁可把盘扔到天上也不愿多传一脚。全场最刺激也最神经质的选手。",
        emoji: "💨",
        dimensions: { S: 90, P: 20, E: 50, T: 25 }
      },
      "L": {
        name: "花粉",
        quote: "\"别喊我，我停不下来，我也不知道我要去哪\"",
        traits: "场上的永动机，裁判的噩梦。体力无限，到处乱窜，哪里都有他。没有固定位置，没有固定跑位路线，就是一个字：动。队友根本不知道他下一秒会出现在哪，自己也不知道。",
        emoji: "🌸",
        dimensions: { S: 85, P: 45, E: 15, T: 25 }
      }
    };

    // ============ 测试逻辑 ============
    let currentQuestion = 0;
    let answers = [];
    let shuffledQuestions = [];
    let scores = { D: 0, I: 0, S: 0, C: 0, F: 0, Y: 0, P: 0, R: 0, L: 0 };
    let startTime = Date.now();

    // Fisher-Yates 洗牌算法
    function shuffle(array) {
      const arr = [...array];
      for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
      }
      return arr;
    }

    function startTest() {
      shuffledQuestions = shuffle(questions);
      currentQuestion = 0;
      answers = [];
      scores = { D: 0, I: 0, S: 0, C: 0, F: 0, Y: 0, P: 0, R: 0, L: 0 };
      startTime = Date.now();

      showPage('test');
      showQuestion();
    }

    function showPage(pageId) {
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById(pageId).classList.add('active');
      document.getElementById(pageId).classList.add('page-transition');
    }

    function showQuestion() {
      const q = shuffledQuestions[currentQuestion];
      document.getElementById('currentQ').textContent = currentQuestion + 1;
      document.getElementById('totalQ').textContent = shuffledQuestions.length;
      document.getElementById('progressFill').style.width = ((currentQuestion) / shuffledQuestions.length * 100) + '%';

      document.getElementById('questionText').textContent = q.text;

      const optionsContainer = document.getElementById('optionsContainer');
      optionsContainer.innerHTML = '';

      q.options.forEach((opt, index) => {
        const optEl = document.createElement('div');
        optEl.className = 'option';
        optEl.innerHTML = `<span class="label">${opt.label}</span> ${opt.text}`;
        optEl.onclick = () => selectOption(index, opt);
        optionsContainer.appendChild(optEl);
      });
    }

    function selectOption(index, option) {
      // 记录答案
      answers.push({
        question: currentQuestion,
        option: index,
        types: option.types
      });

      // 计分
      option.types.forEach(type => {
        scores[type]++;
      });

      // 标记选中
      document.querySelectorAll('.option').forEach((el, i) => {
        el.classList.toggle('selected', i === index);
      });

      // 下一题或显示结果
      setTimeout(() => {
        currentQuestion++;
        if (currentQuestion < shuffledQuestions.length) {
          showQuestion();
        } else {
          showResult();
        }
      }, 300);
    }

    function showResult() {
      // 计算结果
      const maxScore = Math.max(...Object.values(scores));
      const topTypes = Object.keys(scores).filter(k => scores[k] === maxScore);

      // 随机选择最高分的类型
      const resultType = topTypes[Math.floor(Math.random() * topTypes.length)];
      const personality = personalities[resultType];

      // 计算匹配度 (模拟)
      const matchPercent = 75 + Math.floor(Math.random() * 20);

      // 显示结果
      document.getElementById('resultType').textContent = personality.emoji;
      document.getElementById('resultName').textContent = personality.name;
      document.getElementById('resultQuote').textContent = personality.quote;
      document.getElementById('traitsText').textContent = personality.traits;
      document.getElementById('matchPercent').textContent = matchPercent;

      // 显示维度
      const dims = personality.dimensions;
      const dimsEl = document.getElementById('dimensions');
      dimsEl.innerHTML = `
        <div class="dimension"><div class="name">进攻/Style</div><div class="value">${dims.S}%</div></div>
        <div class="dimension"><div class="name">社交/Passion</div><div class="value">${dims.P}%</div></div>
        <div class="dimension"><div class="name">装备/Ego</div><div class="value">${dims.E}%</div></div>
        <div class="dimension"><div class="name">团队/Team</div><div class="value">${dims.T}%</div></div>
      `;

      // 趣味语
      const funTexts = [
        "怎么样，被我拿捏了吧？",
        "别挣扎了，这就是你",
        "承认吧，你就是这样的人",
        "测都测了，还不承认？",
        "命运已经给出了答案"
      ];
      document.getElementById('funText').textContent = funTexts[Math.floor(Math.random() * funTexts.length)];

      showPage('result');
    }

    function restartTest() {
      startTest();
    }

    function shareResult() {
      const resultName = document.getElementById('resultName').textContent;
      const quote = document.getElementById('resultQuote').textContent;

      if (navigator.share) {
        navigator.share({
          title: '🥏 飞盘人格测试',
          text: `我是${resultName}！${quote} 快来测测你是哪种飞盘选手！`,
          url: window.location.href
        });
      } else {
        // 复制链接
        const text = `我是${resultName}！${quote} 快来测测你是哪种飞盘选手！ ${window.location.href}`;
        navigator.clipboard.writeText(text).then(() => {
          alert('链接已复制，快去分享给朋友！');
        });
      }
    }
  </script>
</body>
</html>
